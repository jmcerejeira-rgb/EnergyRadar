# Curated V3 source set: Iberian Energy & Infrastructure.
# RSS is preferred. Official index parsers are used where no reliable feed exists.
# Dead, duplicate and repeatedly timing-out sources are intentionally excluded.

rss:
  # Portugal: press and deal-flow context
  - name: ECO Energia
    url: https://eco.sapo.pt/categoria/energia/feed/
    limit: 25

  - name: ECO Empresas
    url: https://eco.sapo.pt/categoria/empresas/feed/
    limit: 25

  # Energy specialist sources: filtered for Iberia and transaction-relevant themes
  - name: PV Magazine
    url: https://www.pv-magazine.com/feed/
    limit: 30
    include_text_terms:
      - Portugal
      - Spain
      - Iberia
      - Portuguese
      - Spanish
      - acquisition
      - sale
      - divestment
      - investment
      - financing
      - PPA
      - battery
      - storage
      - solar

  - name: Energy Storage News
    url: https://www.energy-storage.news/feed/
    limit: 30
    include_text_terms:
      - Portugal
      - Spain
      - Iberia
      - acquisition
      - sale
      - investment
      - financing
      - BESS
      - battery
      - storage



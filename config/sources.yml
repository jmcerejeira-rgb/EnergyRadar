# Curated V1 source set.
# RSS is preferred. Official index parsers are used where no reliable feed exists.
# Dead, duplicate and repeatedly timing-out sources are intentionally excluded.

rss:
  # Portugal: press and deal-flow context
  - name: ECO Energia
    url: https://eco.sapo.pt/categoria/energia/feed/
    limit: 25

  - name: ECO Empresas
    url: https://eco.sapo.pt/categoria/empresas/feed/
    limit: 25

  # Specialist sector sources: filtered for Iberia and transaction-relevant themes
  - name: PV Magazine
    url: https://www.pv-magazine.com/feed/
    limit: 30
    include_text_terms:
      - Portugal
      - Spain
      - Iberia
      - Portuguese
      - Spanish
      - acquisition
      - sale
      - divestment
      - investment
      - financing
      - PPA
      - battery
      - storage
      - solar

  - name: Energy Storage News
    url: https://www.energy-storage.news/feed/
    limit: 30
    include_text_terms:
      - Portugal
      - Spain
      - Iberia
      - acquisition
      - sale
      - investment
      - financing
      - BESS
      - battery
      - storage

html_indexes:
  # Portugal: energy regulation
  - name: ERSE Comunicados
    parser: erse
    fetch_detail: true
    url: https://www.erse.pt/comunicacao/comunicados/
    base_url: https://www.erse.pt
    limit: 20
    include_link_patterns:
      - /comunicacao/comunicados/
    include_text_terms:
      - eletricidade
      - gás
      - energia
      - tarifas
      - regulamento
      - consulta pública
      - autoconsumo
      - mobilidade elétrica
      - mercado
      - redes

  - name: ERSE Consultas Publicas Em Curso
    parser: erse
    fetch_detail: true
    url: https://www.erse.pt/atividade/consultas-publicas/em-curso/
    base_url: https://www.erse.pt
    limit: 20
    include_text_terms:
      - eletricidade
      - gás
      - energia
      - rede
      - acesso
      - tarifas
      - regulamento
      - mercado
      - autoconsumo
      - armazenamento

  # Portugal: licensing and energy policy. Keep only the energy-filtered index.
  - name: DGEG Energia Destaques
    parser: dgeg
    fetch_detail: true
    url: https://www.dgeg.gov.pt/pt/destaques/?filter=Energia
    base_url: https://www.dgeg.gov.pt
    limit: 20
    include_link_patterns:
      - /pt/destaques/
    include_text_terms:
      - energia
      - eletricidade
      - renovável
      - renováveis
      - solar
      - fotovoltaico
      - autoconsumo
      - armazenamento
      - hidrogénio
      - biometano
      - licenciamento
      - leilão
      - rede

  # Portugal: grid and system operator corporate news
  - name: REN Noticias
    parser: ren_corporate
    fetch_detail: true
    url: https://www.ren.pt/media/noticias
    base_url: https://www.ren.pt
    limit: 20
    include_text_terms:
      - eletricidade
      - gás
      - energia
      - rede
      - interligação
      - armazenamento
      - hidrogénio
      - renovável
      - capacidade
      - investimento

  # Portugal: direct merger-control signal
  - name: AdC Noticias e Comunicados
    url: https://www.concorrencia.pt/index.php/pt/noticias-comunicados-e-intervencoes?created=&created_1=&from=&keys=&to=&type_1=All
    base_url: https://www.concorrencia.pt
    limit: 25
    include_link_patterns:
      - /pt/noticias/
      - /pt/comunicados/
      - /pt/articles/
    include_text_terms:
      - concentração
      - aquisição
      - controlo exclusivo
      - controlo conjunto
      - não oposição
      - notifica
      - energia
      - eletricidade
      - solar
      - renováveis
      - infraestrutura
      - carregamento
      - concessão

# Excluded in V1:
# - Jornal de Negócios Empresas RSS: endpoint returns 404.
# - Renewables Now RSS: endpoint returns 404.
# - REN REMIT feeds and REN Mercado Notícias: repeated timeouts and low M&A signal.
# - ERSE concluded consultations/full-page fallback: duplicate and noisy.
# - Generic DGEG highlights: duplicate of the energy-filtered index.

html_indexes:
  # Portugal: energy regulation
  - name: ERSE Comunicados
    parser: erse
    fetch_detail: true
    url: https://www.erse.pt/comunicacao/comunicados/
    base_url: https://www.erse.pt
    limit: 20
    include_link_patterns:
      - /comunicacao/comunicados/
    include_text_terms:
      - eletricidade
      - gás
      - energia
      - tarifas
      - regulamento
      - consulta pública
      - autoconsumo
      - mobilidade elétrica
      - mercado
      - redes

  - name: ERSE Consultas Publicas Em Curso
    parser: erse
    fetch_detail: true
    url: https://www.erse.pt/atividade/consultas-publicas/em-curso/
    base_url: https://www.erse.pt
    limit: 20
    include_text_terms:
      - eletricidade
      - gás
      - energia
      - rede
      - acesso
      - tarifas
      - regulamento
      - mercado
      - autoconsumo
      - armazenamento

  # Portugal: licensing and energy policy. Keep only the energy-filtered index.
  - name: DGEG Energia Destaques
    parser: dgeg
    fetch_detail: true
    url: https://www.dgeg.gov.pt/pt/destaques/?filter=Energia
    base_url: https://www.dgeg.gov.pt
    limit: 20
    include_link_patterns:
      - /pt/destaques/
    include_text_terms:
      - energia
      - eletricidade
      - renovável
      - renováveis
      - solar
      - fotovoltaico
      - autoconsumo
      - armazenamento
      - hidrogénio
      - biometano
      - licenciamento
      - leilão
      - rede

  # Portugal: grid and system operator corporate news
  - name: REN Noticias
    parser: ren_corporate
    fetch_detail: true
    url: https://www.ren.pt/media/noticias
    base_url: https://www.ren.pt
    limit: 20
    include_text_terms:
      - eletricidade
      - gás
      - energia
      - rede
      - interligação
      - armazenamento
      - hidrogénio
      - renovável
      - capacidade
      - investimento

  # Portugal: direct merger-control signal
